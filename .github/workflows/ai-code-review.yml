name: Caucus Agentic Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write  # Crucial: Allows the bot to post the review on the PR

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the code of the current repository
      - name: Checkout target repository
        uses: actions/checkout@v4
      
      # 2. Checkout the Caucus Agentic bot repository into a subfolder
      - name: Checkout Caucus Agentic
        uses: actions/checkout@v4
        with:
          repository: userdeter1/Caucus-Agentic
          path: caucus-bot
          
      # 3. Setup Python and uv
      - uses: astral-sh/setup-uv@v3
      
      # 4. Run the Agentic Review Pipeline
      - name: Run AI Code Review
        run: |
          cd caucus-bot
          uv sync
          uv run python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Utilisation explicite du modèle Groq
          LLM_MODEL_ID: "groq/llama-3.3-70b-versatile"
          # Injecter la clé Groq depuis les secrets GitHub
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
